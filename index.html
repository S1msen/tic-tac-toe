<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1a1a2e;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      letter-spacing: 0.1em;
    }

    #status {
      font-size: 1.25rem;
      margin-bottom: 1.5rem;
      height: 2rem;
      color: #e0e0e0;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 120px);
      grid-template-rows: repeat(3, 120px);
      gap: 6px;
    }

    .cell {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover {
      background: #1a2a50;
      transform: scale(1.04);
    }

    .cell.x {
      color: #e94560;
    }

    .cell.o {
      color: #53d8fb;
    }

    .cell.win {
      background: #0f3460;
      animation: pop 0.4s ease;
    }

    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    #restart {
      margin-top: 1.5rem;
      padding: 0.75rem 2rem;
      font-size: 1.1rem;
      border: none;
      border-radius: 8px;
      background: #e94560;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s;
    }

    #restart:hover {
      background: #c73652;
    }

    .score-board {
      display: flex;
      gap: 2rem;
      margin-bottom: 1.5rem;
      font-size: 1.1rem;
    }

    .score-board span {
      padding: 0.3rem 1rem;
      border-radius: 6px;
      background: #16213e;
    }

    .score-board .x-score { color: #e94560; }
    .score-board .o-score { color: #53d8fb; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>

  <div class="score-board">
    <span class="x-score">X: <strong id="x-wins">0</strong></span>
    <span>Draws: <strong id="draws">0</strong></span>
    <span class="o-score">O: <strong id="o-wins">0</strong></span>
  </div>

  <div id="status">X's turn</div>

  <div class="board" id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <button id="restart">New Game</button>

  <script>
    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');
    const restartBtn = document.getElementById('restart');
    const xWinsEl = document.getElementById('x-wins');
    const oWinsEl = document.getElementById('o-wins');
    const drawsEl = document.getElementById('draws');

    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board = Array(9).fill('');
    let current = 'X';
    let gameOver = false;
    let scores = { X: 0, O: 0, D: 0 };

    function checkWin(mark) {
      return WINS.find(combo => combo.every(i => board[i] === mark));
    }

    function handleClick(e) {
      const i = +e.target.dataset.i;
      if (board[i] || gameOver) return;

      board[i] = current;
      e.target.textContent = current;
      e.target.classList.add(current.toLowerCase());

      const winCombo = checkWin(current);
      if (winCombo) {
        gameOver = true;
        winCombo.forEach(i => cells[i].classList.add('win'));
        status.textContent = current + ' wins!';
        scores[current]++;
        updateScores();
        return;
      }

      if (board.every(c => c)) {
        gameOver = true;
        status.textContent = "It's a draw!";
        scores.D++;
        updateScores();
        return;
      }

      current = current === 'X' ? 'O' : 'X';
      status.textContent = current + "'s turn";
    }

    function updateScores() {
      xWinsEl.textContent = scores.X;
      oWinsEl.textContent = scores.O;
      drawsEl.textContent = scores.D;
    }

    function restart() {
      board = Array(9).fill('');
      current = 'X';
      gameOver = false;
      status.textContent = "X's turn";
      cells.forEach(c => {
        c.textContent = '';
        c.className = 'cell';
      });
    }

    cells.forEach(c => c.addEventListener('click', handleClick));
    restartBtn.addEventListener('click', restart);
  </script>
</body>
</html>
